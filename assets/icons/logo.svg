<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Sun / Inti symbol -->
  <circle cx="20" cy="20" r="18" fill="url(#logoGrad)"/>
  <!-- Sun rays -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="20" y1="4"  x2="20" y2="1"/>
    <line x1="20" y1="39" x2="20" y2="36"/>
    <line x1="4"  y1="20" x2="1"  y2="20"/>
    <line x1="39" y1="20" x2="36" y2="20"/>
    <line x1="8.6"  y1="8.6"  x2="6.5" y2="6.5"/>
    <line x1="33.5" y1="33.5" x2="31.4" y2="31.4"/>
    <line x1="31.4" y1="8.6"  x2="33.5" y2="6.5"/>
    <line x1="6.5"  y1="33.5" x2="8.6"  y2="31.4"/>
  </g>
  <!-- Inner sun -->
  <circle cx="20" cy="20" r="8" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="20" cy="20" r="5" fill="url(#logoGrad2)"/>
  <!-- Taxi checkered accent at bottom -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4891A"/>
    </linearGradient>
    <linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
</svg>
